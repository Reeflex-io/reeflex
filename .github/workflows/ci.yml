# ci.yml — Reeflex CI: OPA policy tests + Python unit tests.
# Runs on every push to main and on pull requests targeting main, plus manual dispatch.

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One in-flight run per ref; a newer push/PR update cancels the older run
# (prevents duplicate/stacked runs on rapid updates).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  opa-policy-tests:
    name: OPA policy tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install OPA
        run: |
          curl -sL -o opa https://github.com/open-policy-agent/opa/releases/download/v1.18.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa
          opa version

      - name: Run OPA policy tests
        run: opa test reeflex-core/policy/ -v

  python-unit-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    needs: opa-policy-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install OPA (required by the tests — real subprocess, no mock)
        run: |
          curl -sL -o opa https://github.com/open-policy-agent/opa/releases/download/v1.18.0/opa_linux_amd64_static
          chmod +x opa
          sudo mv opa /usr/local/bin/opa

      - name: "Run Python unit tests (core engine: decide + auth + hardening + telemetry + hil)"
        working-directory: reeflex-core
        env:
          REEFLEX_OPA_BIN: opa
          REEFLEX_POLICY_DIR: policy
        run: python -m unittest tests.test_decide tests.test_auth tests.test_hardening tests.test_telemetry tests.test_hil -v
