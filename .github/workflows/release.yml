# release.yml — Reeflex one-gesture multi-channel release.
#
# ONE GESTURE releases everything:
#   push a `v*` tag   (git push origin v0.1.7)     -> this workflow runs
#   publish a GitHub Release   (the UI creates the tag) -> the tag push runs it too
#
# Fan-out (from a single tagged commit):
#   - GitHub Release  <- all built artifacts + SHA256SUMS attached
#   - PyPI            <- reeflex-claude + reeflex-holds + reeflex-mcp (OIDC Trusted Publishing)
#   - GHCR            <- ghcr.io/reeflex-io/reeflex-core  (ONLY if core changed)
#
# n8n-nodes-reeflex now lives in its own dedicated repo (Reeflex-io/n8n-nodes-reeflex)
# with its own OIDC publish workflow — it is NOT built or published from here anymore.
#
# The GHCR image is rebuilt ONLY when reeflex-core/ or the Dockerfile actually
# changed since the previous tag (v0.1.6 shipped with core unchanged, so it stayed
# on v0.1.5). Override with the `push_core` dispatch input.
#
# This workflow does NOT run on authoring — it triggers only on tag push,
# workflow_dispatch, and (transitively) publishing a release.
#
# Registry-side setup a human must do ONCE — see docs/RELEASING.md:
#   - PyPI Trusted Publisher for reeflex-claude, reeflex-holds AND reeflex-mcp
#     (repo Reeflex-io/reeflex, workflow release.yml).

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (e.g. v0.1.7). REQUIRED for manual runs."
        required: true
        type: string
      push_core:
        description: "Force-push the reeflex-core image to GHCR even if core did not change."
        required: false
        type: boolean
        default: false

# Serialize runs per tag; never cancel a run mid-publish.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

# Least privilege by default; each job elevates only what it needs.
permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # prepare: resolve the tag, detect whether the core image must be rebuilt,
  # and extract the per-package versions for the summary.
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare (resolve tag + change detection)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      core_changed: ${{ steps.core.outputs.core_changed }}
      core_reason: ${{ steps.core.outputs.core_reason }}
      claude_version: ${{ steps.ver.outputs.claude_version }}
      holds_version: ${{ steps.ver.outputs.holds_version }}
      mcp_version: ${{ steps.ver.outputs.mcp_version }}
      gate_version: ${{ steps.ver.outputs.gate_version }}
    steps:
      - name: Resolve the release tag
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if [ -z "$TAG" ]; then
              echo "::error::workflow_dispatch requires the 'tag' input (e.g. v0.1.7)."
              exit 1
            fi
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "Resolved release tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout at the tag (full history + tags for change detection)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.tag }}
          fetch-depth: 0
          fetch-tags: true

      - name: Detect whether reeflex-core changed since the previous tag
        id: core
        run: |
          set -euo pipefail
          TAG="${{ steps.resolve.outputs.tag }}"
          if [ "${{ github.event.inputs.push_core }}" = "true" ]; then
            echo "core_changed=true" >> "$GITHUB_OUTPUT"
            echo "core_reason=forced via push_core input" >> "$GITHUB_OUTPUT"
            echo "GHCR: forced by push_core input."
            exit 0
          fi
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || true)"
          if [ -z "$PREV" ]; then
            echo "core_changed=true" >> "$GITHUB_OUTPUT"
            echo "core_reason=no previous tag (first release) — building core" >> "$GITHUB_OUTPUT"
            echo "GHCR: no previous tag, building."
            exit 0
          fi
          # The core image is built from reeflex-core/ AND the root Dockerfile.
          if git diff --name-only "$PREV" "$TAG" -- reeflex-core/ Dockerfile | grep -q .; then
            echo "core_changed=true" >> "$GITHUB_OUTPUT"
            echo "core_reason=reeflex-core/ or Dockerfile changed since ${PREV}" >> "$GITHUB_OUTPUT"
            echo "GHCR: core changed since ${PREV}, will push."
          else
            echo "core_changed=false" >> "$GITHUB_OUTPUT"
            echo "core_reason=no reeflex-core/ or Dockerfile change since ${PREV} — skipping GHCR" >> "$GITHUB_OUTPUT"
            echo "GHCR: no core change since ${PREV}, skipping."
          fi

      - name: Extract per-package versions
        id: ver
        run: |
          set -euo pipefail
          extract_pyproj() { grep -m1 -E '^version[[:space:]]*=' "$1" | sed -E 's/.*"([^"]+)".*/\1/'; }
          CLAUDE="$(extract_pyproj reeflex-claude/pyproject.toml)"
          HOLDS="$(extract_pyproj reeflex-holds/pyproject.toml)"
          MCP="$(extract_pyproj reeflex-mcp/pyproject.toml)"
          GATE="$(grep -m1 -E '^\s*\*\s*Version:' reeflex-wordpress/reeflex-gate.php | grep -oE '[0-9]+\.[0-9]+(\.[0-9]+)?')"
          echo "claude_version=$CLAUDE" >> "$GITHUB_OUTPUT"
          echo "holds_version=$HOLDS"  >> "$GITHUB_OUTPUT"
          echo "mcp_version=$MCP"      >> "$GITHUB_OUTPUT"
          echo "gate_version=$GATE"    >> "$GITHUB_OUTPUT"
          echo "reeflex-claude=$CLAUDE  reeflex-holds=$HOLDS  reeflex-mcp=$MCP  reeflex-gate=$GATE"

  # ---------------------------------------------------------------------------
  # build: produce every artifact ONCE, then hand them to the publish jobs.
  # ---------------------------------------------------------------------------
  build:
    name: Build all artifacts
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout at the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install the Python build backend
        run: python -m pip install --upgrade build

      - name: Build the WordPress + verify zips (stdlib zipfile — no `zip` binary needed)
        run: python scripts/build-wp-zips.py --out dist-artifacts

      - name: Build the Python sdists + wheels (reeflex-claude, reeflex-holds, reeflex-mcp)
        run: |
          set -euo pipefail
          # Per-project dirs so the PyPI job can publish each independently.
          python -m build --outdir pypi-dist/reeflex-claude reeflex-claude
          python -m build --outdir pypi-dist/reeflex-holds  reeflex-holds
          python -m build --outdir pypi-dist/reeflex-mcp    reeflex-mcp
          # Also fold them into the combined release-assets set.
          cp pypi-dist/reeflex-claude/* dist-artifacts/
          cp pypi-dist/reeflex-holds/*  dist-artifacts/
          cp pypi-dist/reeflex-mcp/*    dist-artifacts/

      - name: Generate SHA256SUMS over every artifact
        run: |
          set -euo pipefail
          cd dist-artifacts
          # Write outside the globbed dir first so SHA256SUMS never hashes itself.
          sha256sum -b -- * > "$RUNNER_TEMP/SHA256SUMS"
          mv "$RUNNER_TEMP/SHA256SUMS" SHA256SUMS
          echo "----- SHA256SUMS -----"
          cat SHA256SUMS

      - name: Upload release-assets (all artifacts + SHA256SUMS)
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist-artifacts/
          if-no-files-found: error
          retention-days: 7

      - name: Upload PyPI dist — reeflex-claude
        uses: actions/upload-artifact@v4
        with:
          name: pypi-reeflex-claude
          path: pypi-dist/reeflex-claude/
          if-no-files-found: error
          retention-days: 7

      - name: Upload PyPI dist — reeflex-holds
        uses: actions/upload-artifact@v4
        with:
          name: pypi-reeflex-holds
          path: pypi-dist/reeflex-holds/
          if-no-files-found: error
          retention-days: 7

      - name: Upload PyPI dist — reeflex-mcp
        uses: actions/upload-artifact@v4
        with:
          name: pypi-reeflex-mcp
          path: pypi-dist/reeflex-mcp/
          if-no-files-found: error
          retention-days: 7

  # ---------------------------------------------------------------------------
  # github-release: attach every built artifact to the release for this tag.
  # Creates the release if it does not exist yet (bare tag push); otherwise
  # updates it (leaves an existing body untouched).
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build]
    permissions:
      contents: write
    steps:
      - name: Download release-assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Attach artifacts to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: release-assets/**
          fail_on_unmatched_files: true
          generate_release_notes: false

  # ---------------------------------------------------------------------------
  # pypi: publish reeflex-claude AND reeflex-holds via OIDC Trusted Publishing.
  # No token in the workflow — id-token: write does the auth. A Trusted Publisher
  # must be configured on PyPI for EACH project (see docs/RELEASING.md).
  # skip-existing: true makes re-runs idempotent (a version already on PyPI is
  # skipped, not an error).
  # ---------------------------------------------------------------------------
  pypi:
    name: PyPI publish (reeflex-claude + reeflex-holds + reeflex-mcp)
    runs-on: ubuntu-latest
    needs: [prepare, build]
    permissions:
      id-token: write # OIDC — the ONLY auth used; no PyPI token in the repo.
      contents: read
    # Optional hardening: bind to a GitHub Environment named "pypi" and scope the
    # PyPI Trusted Publisher to that environment. Create the environment first.
    # environment: pypi
    steps:
      - name: Download reeflex-claude dist
        uses: actions/download-artifact@v4
        with:
          name: pypi-reeflex-claude
          path: dist-claude

      - name: Download reeflex-holds dist
        uses: actions/download-artifact@v4
        with:
          name: pypi-reeflex-holds
          path: dist-holds

      - name: Download reeflex-mcp dist
        uses: actions/download-artifact@v4
        with:
          name: pypi-reeflex-mcp
          path: dist-mcp

      - name: Publish reeflex-claude to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-claude
          skip-existing: true
          # BOOTSTRAP FALLBACK (only if OIDC Trusted Publishing is not yet set up):
          # uncomment and wire a PYPI_API_TOKEN repo secret; then remove the
          # id-token permission above. OIDC is the preferred, tokenless path.
          # password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish reeflex-holds to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-holds
          skip-existing: true
          # BOOTSTRAP FALLBACK (see note above):
          # password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Publish reeflex-mcp to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-mcp
          skip-existing: true
          # BOOTSTRAP FALLBACK (see note above):
          # password: ${{ secrets.PYPI_API_TOKEN }}

  # ---------------------------------------------------------------------------
  # ghcr: build + push ghcr.io/reeflex-io/reeflex-core, tagged with the release
  # tag AND latest. Runs ONLY when core (or the Dockerfile) changed, or when
  # forced via the push_core dispatch input.
  # ---------------------------------------------------------------------------
  ghcr:
    name: GHCR core image
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.core_changed == 'true'
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout at the tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Canonical, lowercase image name (matches the existing published package).
          images: ghcr.io/reeflex-io/reeflex-core
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag }}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # summary: write the channel checklist to the job summary. Runs always so it
  # reflects skipped/failed jobs too.
  # ---------------------------------------------------------------------------
  summary:
    name: Channel checklist
    runs-on: ubuntu-latest
    needs: [prepare, build, github-release, pypi, ghcr]
    if: always()
    steps:
      - name: Write channel checklist
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          CLAUDE_V: ${{ needs.prepare.outputs.claude_version }}
          HOLDS_V: ${{ needs.prepare.outputs.holds_version }}
          MCP_V: ${{ needs.prepare.outputs.mcp_version }}
          GATE_V: ${{ needs.prepare.outputs.gate_version }}
          CORE_CHANGED: ${{ needs.prepare.outputs.core_changed }}
          CORE_REASON: ${{ needs.prepare.outputs.core_reason }}
          R_RELEASE: ${{ needs.github-release.result }}
          R_PYPI: ${{ needs.pypi.result }}
          R_GHCR: ${{ needs.ghcr.result }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          mark() {
            case "$1" in
              success)   echo "✅ done" ;;
              skipped)   echo "⏭️ skipped" ;;
              failure)   echo "❌ failed" ;;
              cancelled) echo "⏹️ cancelled" ;;
              *)         echo "❔ $1" ;;
            esac
          }
          # GHCR reports "pushed" or "skipped (no core change)" specifically.
          if [ "$CORE_CHANGED" = "true" ]; then GHCR_STATUS="$(mark "$R_GHCR")"; else GHCR_STATUS="⏭️ skipped (no core change)"; fi

          {
            echo "# Reeflex release ${TAG} — channel checklist"
            echo ""
            echo "| Channel | Package | Version | Status | Link |"
            echo "|---|---|---|---|---|"
            echo "| GitHub Release | reeflex (${TAG}) | ${TAG} | $(mark "$R_RELEASE") | https://github.com/${REPO}/releases/tag/${TAG} |"
            echo "| PyPI | reeflex-claude | ${CLAUDE_V} | $(mark "$R_PYPI") | https://pypi.org/project/reeflex-claude/${CLAUDE_V}/ |"
            echo "| PyPI | reeflex-holds | ${HOLDS_V} | $(mark "$R_PYPI") | https://pypi.org/project/reeflex-holds/${HOLDS_V}/ |"
            echo "| PyPI | reeflex-mcp | ${MCP_V} | $(mark "$R_PYPI") | https://pypi.org/project/reeflex-mcp/${MCP_V}/ |"
            echo "| GHCR | reeflex-core | ${TAG} + latest | ${GHCR_STATUS} | https://github.com/${REPO}/pkgs/container/reeflex-core |"
            echo ""
            echo "GHCR decision: ${CORE_REASON}"
            echo ""
            echo "WordPress adapter (reeflex-gate) version in the attached zips: ${GATE_V}."
            echo ""
            echo "> PyPI status shows the result of the combined publish job (both dists)."
            echo "> n8n-nodes-reeflex is released from its own repo (Reeflex-io/n8n-nodes-reeflex), not from here."
          } >> "$GITHUB_STEP_SUMMARY"
