<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 360" width="860" height="360" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Client boundary -->
  <rect x="20" y="44" width="820" height="292" rx="12" fill="#fbfcfe" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="430" y="74" text-anchor="middle" fill="#475569" font-weight="bold" font-size="14" letter-spacing="1">CLIENT INFRASTRUCTURE</text>

  <!-- AI Agent -->
  <rect x="48" y="140" width="132" height="60" rx="8" fill="#eef1f8" stroke="#5b6b9e" stroke-width="1.5"/>
  <text x="114" y="166" text-anchor="middle" fill="#27324d" font-weight="bold" font-size="13">AI Agent</text>
  <text x="114" y="184" text-anchor="middle" fill="#5d6973" font-size="10">(any LLM client)</text>

  <!-- intent -->
  <line x1="180" y1="170" x2="258" y2="170" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="219" y="160" text-anchor="middle" fill="#5d6973" font-size="10">intent</text>

  <!-- Adapter -->
  <rect x="258" y="140" width="148" height="60" rx="8" fill="#f3f5f8" stroke="#4a5568" stroke-width="1.5"/>
  <text x="332" y="166" text-anchor="middle" fill="#1a202c" font-weight="bold" font-size="13">Adapter</text>
  <text x="332" y="184" text-anchor="middle" fill="#5d6973" font-size="10">normalize + enforce</text>

  <!-- forward + return between Adapter and core (labels sit in the gap) -->
  <line x1="406" y1="164" x2="500" y2="164" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="453" y="154" text-anchor="middle" fill="#5d6973" font-size="10">POST /v1/decide</text>
  <line x1="500" y1="186" x2="406" y2="186" stroke="#475569" stroke-width="1.5" marker-end="url(#ah)"/>
  <text x="453" y="200" text-anchor="middle" fill="#5d6973" font-size="10">decision</text>

  <!-- reeflex-core -->
  <rect x="500" y="132" width="156" height="76" rx="8" fill="#e4f1f2" stroke="#0b6e75" stroke-width="1.5"/>
  <text x="578" y="158" text-anchor="middle" fill="#0a4f54" font-weight="bold" font-size="13">reeflex-core</text>
  <text x="578" y="176" text-anchor="middle" fill="#327a7f" font-size="10">Python + OPA/Rego</text>
  <text x="578" y="192" text-anchor="middle" fill="#327a7f" font-size="10">HTTP :8080</text>

  <!-- write to audit -->
  <line x1="656" y1="168" x2="712" y2="168" stroke="#475569" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <text x="684" y="158" text-anchor="middle" fill="#5d6973" font-size="10">write</text>

  <!-- Audit log -->
  <rect x="712" y="140" width="116" height="60" rx="8" fill="#fdeef0" stroke="#b05566" stroke-width="1.5"/>
  <text x="770" y="166" text-anchor="middle" fill="#8a2e40" font-weight="bold" font-size="13">Audit log</text>
  <text x="770" y="184" text-anchor="middle" fill="#5d6973" font-size="10">JSONL append-only</text>

  <!-- core to OPA -->
  <line x1="578" y1="208" x2="578" y2="250" stroke="#475569" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#ah)"/>

  <!-- OPA -->
  <rect x="502" y="250" width="152" height="46" rx="8" fill="#fff4e6" stroke="#cf8a2e" stroke-width="1.5"/>
  <text x="578" y="278" text-anchor="middle" fill="#8a5a12" font-weight="bold" font-size="11">OPA/Rego evaluation</text>

  <!-- caption -->
  <text x="335" y="318" text-anchor="middle" fill="#94a3b8" font-size="11" font-style="italic">data never leaves the client</text>
</svg>
