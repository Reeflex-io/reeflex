# docs.reeflex.io — MkDocs Material configuration.
# Source of truth: docs/. Deployed by .github/workflows/docs.yml to GitHub Pages.
site_name: Reeflex Docs
site_description: >-
  Reeflex is a decision firewall for AI agents: it governs what an AI agent may
  do to your systems, deciding allow / hold / deny on each action's real-world
  impact — on any backend, before it runs. Stop AI agents from taking
  destructive actions, deterministically, with zero LLM in the decision path.
site_url: https://docs.reeflex.io/
site_author: Reeflex
copyright: >-
  Apache-2.0 licensed. A deterministic gate, not another AI. &middot;
  <a href="/faq/">FAQ</a> &middot; <a href="/roadmap/">Roadmap</a> &middot;
  <a href="https://reeflex.io/">reeflex.io &rarr;</a>

repo_url: https://github.com/Reeflex-io/reeflex
repo_name: Reeflex-io/reeflex
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: overrides
  language: en
  # Header mark = the OFFICIAL brand badge (favicon.svg), not Material's stock
  # library glyph (that default was the top "recolored Material" tell). The
  # badge is a self-contained dark tile + steel chevrons + ember orb: crisp on
  # the white default header; on the dark toggle the tile blends into the navy,
  # so extra.css adds a hairline ring in slate to keep it reading. Same approved
  # asset also serves the browser tab.
  logo: assets/favicon.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    # LIGHT is the deterministic default (docs are read for hours — Stripe /
    # Pydantic / FastAPI convention). Dark stays one click away via the toggle.
    # No prefers-color-scheme media here on purpose: a dark-OS visitor still
    # lands on the readable light docs, then opts into dark if they want it.
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light
  font:
    text: Inter
    code: JetBrains Mono
  features:
    # Classic docs anatomy: a persistent LEFT sidebar tree (NO top tabs), the
    # 7 groups as its top level, "On this page" TOC on the right.
    - navigation.sections
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips

extra_css:
  - stylesheets/extra.css

# Self-hosted Mermaid. Vendoring the library so window.mermaid is defined
# BEFORE Material's built-in handler runs defeats the CDN lazy-fetch race that
# rendered diagrams blank on most loads (measured). Material's own handler then
# does the render + live theming; no custom init is needed or wanted (a second
# run() only races Material's and throws UnknownDiagramError on every load).
extra_javascript:
  - javascripts/mermaid.min.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.smartsymbols
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  # "Last updated" dates: needs the full git history the CI checkout provides
  # (fetch-depth: 0). Runs in CI only, like social cards, so a local preview
  # build stays clean and `--strict` reflects content, not the environment.
  - git-revision-date-localized:
      enabled: !ENV [CI, false]
      enable_creation_date: false # show a single "last updated" date, not two
      enable_git_follow: false
      type: date
      fallback_to_build_date: true
  # Social cards (auto OG images) need the imaging libs; build only in CI.
  - social:
      enabled: !ENV [CI, false]

extra:
  # NO `homepage:` — it would repoint the header/drawer/footer logo at the
  # marketing site (reeflex.io). The logo must go to the DOCS home (site_url).
  # The marketing cross-link stays explicit + labeled in the footer (copyright
  # line below + the globe social icon).
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Reeflex-io/reeflex
      name: Reeflex on GitHub
    - icon: fontawesome/solid/globe
      link: https://reeflex.io/
      name: reeflex.io
  generator: false

# 7 top-level sidebar groups (the left-tree top level). Policy is nested under
# Concepts (customizing the five rules is an extension of understanding them);
# Compliance is nested under Operations (it is a run-time evidence concern).
# FAQ + Roadmap will live in the footer + Home, not in the tree, when they land.
# FAQ + Roadmap live in the footer + Home, not in the sidebar tree (they are
# orientation pages, not part of the reading spine). not_in_nav keeps them out
# of the tree while --strict stays happy that they are intentionally excluded.
not_in_nav: |
  /faq.md
  /roadmap.md

nav:
  - Home: index.md
  - Getting started:
      - getting-started/index.md
      - Launch article: blog/one-minute-policy.md
  - Concepts:
      - concepts/index.md
      - Why Reeflex (HIL / HOTL / AIL): why-reeflex.md
      - Policy & customization:
          - policy/index.md
          - Adapt the policy: policy-guide.md
  - Architecture:
      - architecture.md
      - Diagrams: architecture/diagrams.md
  - Adapters:
      - adapters/index.md
      - n8n (zero-code): guides/n8n.md
      - MCP gateway: mcp-gateway.md
  - Operations:
      - operations/index.md
      - SIEM export: siem.md
      - Compliance & open core:
          - compliance/index.md
          - Open core: open-core.md
  - Reference:
      - reference/index.md
      - REST API: reference/rest-api.md
      - Action Envelope: reference/action-envelope.md
      - Configuration: reference/configuration.md
      - Changelog: reference/changelog.md
      - "ADR 0001: deployment model": adr/0001-deployment-model.md
      - "ADR 0002: no LLM in the decision path": adr/0002-no-llm-in-decision-path.md
      - Releasing: RELEASING.md
