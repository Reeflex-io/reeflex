# Publishes n8n-nodes-reeflex to npm on every version tag push matching
# n8n-nodes-reeflex-*.*.* (e.g. n8n-nodes-reeflex-0.1.0). The prefix keeps
# this workflow scoped to this one package inside the reeflex monorepo -
# it must never fire on a tag meant for another package in this repo.
#
# GATE (CLAUDE.md SS0.3/SS6): this workflow is prepared but INERT until a
# human completes the one-time npm Trusted Publisher setup (see PUBLISH.md)
# and pushes a matching tag. No push, publish, or release action in this
# repository is ever taken automatically by an agent.
#
# Starting May 1 2026, n8n requires all community nodes submitted for
# Creator Portal verification to be published via GitHub Actions with an
# npm provenance statement. This workflow satisfies that requirement.
# Provenance lets anyone cryptographically verify that a package was built
# by this exact workflow, from this exact repository and commit, via
# GitHub's OIDC infrastructure. See PUBLISH.md for the full checklist.
#
# ─── ONE-TIME SETUP (human, see PUBLISH.md) ────────────────────────────────
#
# Option A - OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. Log in to npmjs.com and open the n8n-nodes-reeflex package settings
#      (after the FIRST manual publish - npm requires the package to exist
#      before a Trusted Publisher can be attached to it).
#   2. Under "Publish access" -> "Trusted Publishers", click "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: Reeflex-io
#        Repository name:  reeflex
#        Workflow name:    publish.yml   (this file's name, not the `name:` field)
#   4. Leave the NPM_TOKEN secret unset. GitHub's OIDC token is used instead.
#
# Option B - npm Automation Token (fallback):
#   1. On npmjs.com: Access Tokens -> Generate New Token -> Granular Access
#      Token, scoped to n8n-nodes-reeflex with "Read and write" publish access.
#   2. In GitHub: Settings -> Secrets and variables -> Actions -> New secret,
#      named NPM_TOKEN.
#
# ─── RELEASE PROCESS (human) ───────────────────────────────────────────────
#
# From the n8n-nodes-reeflex/ directory:
#   npm run release
# This lints, builds, prompts for a version bump, updates the changelog,
# commits, tags (n8n-nodes-reeflex-X.Y.Z), and pushes - which triggers this
# workflow to publish to npm.

name: Publish n8n-nodes-reeflex

on:
  push:
    tags:
      - 'n8n-nodes-reeflex-*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: n8n-nodes-reeflex

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      # Scoped down from the default (write) for least-privilege publishing.
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: n8n-nodes-reeflex/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Release
        # Publishes to npm with a provenance attestation (requires
        # id-token: write above). Lint and build run automatically as part
        # of `n8n-node release`.
        #
        # Option A (OIDC): leave NPM_TOKEN unset - the token step below is
        #   skipped and npm uses the OIDC exchange instead.
        # Option B (token): set NPM_TOKEN in repo secrets - it is written to
        #   .npmrc here before publishing.
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release -- --ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
