name: CI

on:
  pull_request:
    paths:
      - 'n8n-nodes-reeflex/**'
      - '.github/workflows/ci.yml'
  push:
    branches:
      - main
    paths:
      - 'n8n-nodes-reeflex/**'

# Cancel in-progress runs for the same branch/PR to avoid wasting CI minutes.
concurrency:
  group: n8n-nodes-reeflex-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: n8n-nodes-reeflex

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: n8n-nodes-reeflex/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
